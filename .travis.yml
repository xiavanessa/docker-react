sudo: required
services:
  - docker

before_install:
  - docker build -t vanessaiscool/docker-react -f Dockerfile.dev .

script:
  - docker run -e CI=true vanessaiscool/docker-react npm run test -- --coverage

deploy:
  provider: elasticbeanstalk
  region: 'us-west-2'
  app: 'docker'
  env: 'Docker-env'
  bucket_name: 'elasticbeanstalk-us-east-2-123456789012'
  bucket_path: 'docker'
  on:
    branch: main
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key:
    secure: '$AWS_SECRET_KEY'
