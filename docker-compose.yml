version: "3"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - /app/node_modules
      # map the current folder outside the container to the /app folder inside the container
      - .:/app
  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      # The dash (-) is just YAML syntax for list items.
      - /app/node_modules
      - .:/app
    command: ["npm", "run", "test"]
